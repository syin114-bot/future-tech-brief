<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="马来西亚 AI 创新社区，分享 AI 工具、Vibe Coding 项目与最新科技资讯">
<meta property="og:title" content="未来科技简报 · AI 创新社区">
<meta property="og:description" content="展示你的 AI 创意，发现最新工具，加入马来西亚最活跃的 AI 学生社区">
<title>未来科技简报 · AI 创新社区</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<!-- 多语言系统样式 -->
<link rel="stylesheet" href="/i18n/i18n-styles.css" />
<style>
:root {
  --bg: #080e1a; --bg2: #0d1829; --bg3: #111f35; --card: #0f1c2e;
  --border: rgba(255,255,255,0.07); --blue: #00b4ff; --purple: #7c3aed;
  --green: #00e5a0; --text: #e8edf5; --muted: #5a7090; --muted2: #3a5070;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; overflow-x: hidden; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 3px; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8,14,26,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-mark { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, var(--blue), var(--purple)); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: #fff; }
.logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); }
.logo-year { font-size: 10px; font-weight: 300; color: var(--muted); display: block; line-height: 1; }
.nav-links { display: flex; gap: 4px; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 13.5px; padding: 6px 14px; border-radius: 6px; transition: all 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(255,255,255,0.06); }
.nav-actions { display: flex; gap: 8px; align-items: center; }
.lang-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; border: none; font-size: 13px; font-weight: 500; padding: 7px 18px; border-radius: 7px; cursor: pointer; transition: all 0.2s; }
.btn-primary:hover { opacity: 0.85; }
section { position: relative; z-index: 1; }
.container { max-width: 1200px; margin: 0 auto; padding: 80px 32px; }
.divider { height: 1px; background: var(--border); margin: 0 32px; }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <div class="logo-mark">FT</div>
    <div class="logo-text">未来科技简报<span class="logo-year">AI INNOVATION COMMUNITY 2026</span></div>
  </a>
  <div class="nav-links">
    <a href="#" class="active">首页</a>
    <a href="#tools">AI 工具</a>
    <a href="#vibe">Vibe Coding</a>
    <a href="#projects">项目</a>
    <a href="#news">资讯</a>
  </div>
  <div class="nav-actions">
    <button class="lang-btn" id="language-btn" onclick="showLanguageDropdown && showLanguageDropdown(this)">🌐 中文</button>
    <button class="btn-primary" id="nav-auth-btn" onclick="openModal('auth')">登录 / 注册</button>
  </div>
</nav>

<div id="app-content">
  <!-- 内容由原 index.html 组成 -->
</div>

<!-- 多语言系统脚本 -->
<script src="/i18n/i18n.js"></script>

<script>
// 初始化i18n
document.addEventListener('DOMContentLoaded', async () => {
  if (window.i18n && window.i18n.initializeI18n) {
    await window.i18n.initializeI18n();
  }
});
</script>

</body>
</html>
